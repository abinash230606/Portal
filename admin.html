<!DOCTYPE html>
<html>
<body>

<h2>All Complaints 😤</h2>

<ul id="list"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
alert("Firebase script starting"); // DEBUG

const firebaseConfig = {
  apiKey: "AIzaSyBK5Rh-lthMrU3gc-9vEQXUiSeRQnAZhos",
  authDomain: "project2-965b4.firebaseapp.com",
  projectId: "project2-965b4",
  storageBucket: "project2-965b4.firebasestorage.app",
  messagingSenderId: "165150065285",
  appId: "1:165150065285:web:26f6d0b448679312c65fec"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const list = document.getElementById("list");

db.collection("complaints").get()
.then((snapshot) => {
  alert("Data fetched"); // DEBUG

  if (snapshot.empty) {
    list.innerHTML = "No complaints yet 😄";
    return;
  }

  snapshot.forEach((doc) => {
    const d = doc.data();

    const li = document.createElement("li");
    li.innerText =
      "😤 " + d.issue +
      " | " + d.category +
      " | Fix: " + d.solution +
      " | Status: " + d.status;

    list.appendChild(li);
  });
})
.catch((err) => {
  alert("Error: " + err);
});
</script>

</body>
</html>
